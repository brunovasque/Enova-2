# wrangler.toml — Cloudflare Worker ENOVA 2
#
# PRODUÇÃO: nv-enova-2
#   - deploy via `wrangler deploy` (sem --env flag)
#
# TESTE: nv-enova-2-test (env.test)
#   - deploy via `wrangler deploy --env test`
#
# IMPORTANTE — secrets (valores sensíveis)
#   Nunca colocar secrets neste arquivo. Usar exclusivamente:
#     wrangler secret put <NOME>
#     wrangler secret put <NOME> --env test
#
#   Lista canônica de secrets esperados:
#     SUPABASE_URL              — URL completa do projeto Supabase
#     SUPABASE_SERVICE_ROLE_KEY — chave de service role (nunca expor em log)
#     META_APP_SECRET           — secret HMAC para validação de assinatura Meta
#     META_VERIFY_TOKEN         — token de verificação do webhook Meta
#     META_ACCESS_TOKEN         — token de acesso Meta para outbound
#     META_PHONE_NUMBER_ID      — ID do número de telefone Meta
#     OPENAI_API_KEY            — chave OpenAI para LLM
#     CRM_ADMIN_KEY             — chave de autenticação admin do CRM
#
# SEGURANÇA DE DEPLOY — FLAGS PROD/CANARY (PR fix/wrangler-no-vars-overwrite)
#   keep_vars = true impede que wrangler delete do painel Cloudflare qualquer
#   variável que não esteja listada neste arquivo.
#
#   Flags de feature PROD/canary foram REMOVIDAS da seção [vars] abaixo.
#   Elas devem ser configuradas exclusivamente via Cloudflare Dashboard ou
#   wrangler secret/var put. Deploy não deve jamais sobrescrevê-las.
#
#   Flags removidas (configurar APENAS via dashboard/CLI manual):
#     ENOVA2_ENABLED          — habilita pipeline inbound completo
#     LLM_REAL_ENABLED        — habilita chamadas OpenAI reais
#     OUTBOUND_CANARY_ENABLED — habilita outbound para wa_id canary
#     OUTBOUND_CANARY_WA_ID   — wa_id autorizado para canary outbound
#     SUPABASE_REAL_ENABLED   — habilitar leitura Supabase real
#     SUPABASE_WRITE_ENABLED  — habilitar escrita Supabase real
#     CANARY_PERCENT          — percentual de canary
#
#   Flags mantidas neste arquivo (defaults de segurança invariantes):
#     CLIENT_REAL_ENABLED     = "false"  SEMPRE false — nunca habilitar via deploy
#     MEMORY_SUPABASE_ENABLED = "false"  default seguro
#     ROLLBACK_FLAG           = "false"  deploy nunca ativa rollback
#     MAINTENANCE_MODE        = "false"  deploy nunca ativa manutenção
#     GOLIVE_HARNESS_ENABLED  = "false"  deploy nunca ativa harness

name            = "nv-enova-2"
main            = "src/worker.ts"
compatibility_date = "2026-04-20"

# keep_vars = true: preserva no painel Cloudflare todas as variáveis que não
# estão listadas neste arquivo. Sem isso, wrangler delete vars do painel que
# não constam aqui. Obrigatório enquanto flags PROD/canary forem configuradas
# fora deste arquivo.
keep_vars = true

# ---------------------------------------------------------------------------
# Vars não sensíveis — defaults de segurança invariantes
#
# ATENÇÃO: Flags de feature PROD/canary foram REMOVIDAS intencionalmente.
# Configurar ENOVA2_ENABLED, LLM_REAL_ENABLED, OUTBOUND_CANARY_ENABLED,
# OUTBOUND_CANARY_WA_ID, SUPABASE_REAL_ENABLED, SUPABASE_WRITE_ENABLED e
# CANARY_PERCENT exclusivamente via Cloudflare Dashboard.
# Deploy não deve sobrescrever essas flags.
# ---------------------------------------------------------------------------
[vars]
# --- Supabase ---
MEMORY_SUPABASE_ENABLED = "false"   # habilitar memória via Supabase

# --- WhatsApp / outbound ---
CLIENT_REAL_ENABLED     = "false"   # SEMPRE false — nunca habilitar via deploy

# --- Operacional ---
ROLLBACK_FLAG           = "false"   # bloqueia tudo imediatamente quando "true"
MAINTENANCE_MODE        = "false"   # bloqueia atendimento quando "true"
GOLIVE_HARNESS_ENABLED  = "false"   # habilita harness de go-live

# ---------------------------------------------------------------------------
# Ambiente de teste — validação controlada antes de promoção para produção
# Todas as flags de feature são explicitamente false para teste seguro.
# ---------------------------------------------------------------------------
[env.test]
name = "nv-enova-2-test"

[env.test.vars]
SUPABASE_REAL_ENABLED   = "false"
SUPABASE_WRITE_ENABLED  = "false"
MEMORY_SUPABASE_ENABLED = "false"
LLM_REAL_ENABLED        = "false"
CLIENT_REAL_ENABLED     = "false"
ENOVA2_ENABLED          = "false"
OUTBOUND_CANARY_ENABLED = "false"
OUTBOUND_CANARY_WA_ID   = ""
CANARY_PERCENT          = "0"
ROLLBACK_FLAG           = "false"
MAINTENANCE_MODE        = "false"
GOLIVE_HARNESS_ENABLED  = "false"
